[global]
type=global
user_agent=Asterisk-PBX

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; Phone A (SIP extension 6001) maps to User 1 (201001234567)
[6001]
type=endpoint
context=prepaid-outbound
disallow=all
allow=ulaw
allow=alaw
auth=6001_auth
aors=6001_aor
callerid=User 1 <201001234567>

[6001_auth]
type=auth
auth_type=userpass
username=6001
password=password6001

[6001_aor]
type=aor
max_contacts=5

; Phone B (SIP extension 6002) maps to User 2 (201009876543)
[6002]
type=endpoint
context=prepaid-outbound
disallow=all
allow=ulaw
allow=alaw
auth=6002_auth
aors=6002_aor
callerid=User 2 <201009876543>

[6002_auth]
type=auth
auth_type=userpass
username=6002
password=password6002

[6002_aor]
type=aor
max_contacts=5
