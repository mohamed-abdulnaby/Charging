[general]
static=yes
writeprotect=no

[prepaid-outbound]
; Match any dialed extension 6001 or 6002
exten => _600[1-2],1,NoOp(Prepaid Call Authorization for Caller ${CALLERID(num)})
 ; 1. Query the containerized authorization endpoint using 'charging-app' service name on Docker network
 same => n,Set(CURL_RESULT=${CURL(http://charging-app:8080/api/agi/authorize?callerid=${CALLERID(num)}&token=***REDACTED***)})
 same => n,NoOp(CURL Result received: ${CURL_RESULT})
 ; 2. Parse the maximum allowed call duration in milliseconds from JSON
 same => n,Set(MAX_DURATION=${CUT(CURL_RESULT,"maxDuration":,2)})
 same => n,Set(MAX_DURATION=${CUT(MAX_DURATION,\,,1)})
 same => n,Set(MAX_DURATION=${CUT(MAX_DURATION,.,1)})
 same => n,NoOp(Parsed Max Duration: ${MAX_DURATION} ms)
 ; 3. Check if authorized (MAX_DURATION > 0)
 same => n,GotoIf($[${MAX_DURATION} > 0]?allow:reject)
 
 same => n(allow),NoOp(Call allowed. Routing to PJSIP/${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30,L(${MAX_DURATION}))
 same => n,Hangup()
 
 same => n(reject),NoOp(Call rejected. Playing vm-goodbye)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()
