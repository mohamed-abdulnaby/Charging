services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: charging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ***REDACTED***
    ports:
      - "5433:5432" # Map container 5432 to host port 5433 to prevent conflicts with local instances
    volumes:
      - charging_db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d charging"]
      interval: 5s
      timeout: 5s
      retries: 10

  charging-app:
    dns: 8.8.8.8
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8888:8888"
      - "4573:4573"
      - "10000-10010:10000-10010/udp"
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://db:5432/charging}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-***REDACTED***}
      AGI_TOKEN: ${AGI_TOKEN:-***REDACTED***}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  asterisk:
    image: docker.io/andrius/asterisk:latest
    ports:
      - "5070:5070/udp"
      - "5070:5070/tcp"
    volumes:
      - ./asterisk_config:/etc/asterisk:ro
    depends_on:
      - charging-app

volumes:
  charging_db_data: