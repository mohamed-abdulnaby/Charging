# ============================================================
# Production: Use NeonDB (cloud PostgreSQL)
# ============================================================
services:
  charging-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8888:8888"
      - "4573:4573"
      - "10000-10010:10000-10010/udp"
    environment:
      # NeonDB Primary Configuration
      DB_URL: jdbc:postgresql://ep- quiet-sunset-aszvxpyx- pooler.c-4.eu-central-1. aws.neon.tech/neondb?sslmode=require&channel_binding=require
      DB_USER: neondb_owner
      DB_PASSWORD: npg_ sIR1NZG0wEeT
      AGI_TOKEN: ${AGI_TOKEN:-secret-agi-token}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  asterisk:
    image: docker.io/ andrius/asterisk:latest
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
    volumes:
      - ./asterisk_ config:/etc/asterisk:ro
    depends_on:
      - charging-app

