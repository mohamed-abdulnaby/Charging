services:
  charging-app:
    # ── Multi-stage cross-platform build ───────────────────────
    # `build.network: host` fixes Maven Central DNS during build.
    # Works on Docker 23+ AND Podman 4.5+.
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    # ── Runtime dns ensures the app container can resolve ──────
    # NeonDB (and any other internet host) from inside the bridge.
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8080:8080"
      - "8888:8888"
      - "4573:4573"
      - "10000-10010:10000-10010/udp"
    environment:
      # ── NeonDB (single source) ──────────────────────────────
      # All values MUST be set in .env — no hardcoded fallbacks.
      DB_URL: ${DB_URL:-jdbc:postgresql://ep-quiet-sunset-aszvxpyx-pooler.c-4.eu-central-1.aws.neon.tech:5432/neondb?sslmode=require&channel_binding=require}
      DB_USER: ${DB_USER:-neondb_owner}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      AGI_TOKEN: ${AGI_TOKEN:?AGI_TOKEN must be set in .env}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - recordings_data:/tmp

  asterisk:
    image: docker.io/andrius/asterisk:latest
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "5070:5070/udp"
      - "5070:5070/tcp"
    volumes:
      - ./asterisk_config:/etc/asterisk:ro
      - recordings_data:/tmp
    depends_on:
      - charging-app

volumes:
  recordings_data:
