; Prepaid Voice Call Charging - Asterisk Dialplan Template
; Place in /etc/asterisk/extensions.conf

[prepaid-outbound]
exten => _X.,1,NoOp(Prepaid Call Authorization for ${CALLERID(num)})
 ; If AGI_TOKEN is configured, append &token=your-secret-token to the URL below
 same => n,Set(CURL_RESULT=${CURL(http://localhost:8080/api/agi/authorize?callerid=${CALLERID(num)})})
 same => n,Set(MAX_DURATION=${CUT(CURL_RESULT,"maxDuration":,2)})
 same => n,GotoIf($[${MAX_DURATION} > 0]?allow:reject)
 same => n(allow),NoOp(Call allowed. Max Duration: ${MAX_DURATION} ms)
 same => n,Dial(PJSIP/${EXTEN},30,L(${MAX_DURATION}))
 same => n,Hangup()
 same => n(reject),Playback(vm-goodbye)
 same => n,Hangup()
